# ============================================================
#  FloowRoom – application.properties (Render-ready)
#  Lê variáveis de ambiente; usa valores locais como fallback
# ============================================================

# --- Servidor ---
server.port=${PORT:8080}

# --- Banco de Dados (variáveis definidas no Render Dashboard ou fallback filess.io) ---
spring.datasource.url=${DATABASE_URL:jdbc:mysql://9rsyu1.h.filess.io:3306/FlowRoom_locationof?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:FlowRoom_locationof}
spring.datasource.password=${DATABASE_PASSWORD:f946bff4ea9bf7373e860dcef1a0d952d072e0f0}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# --- Hikari Connection Pool (Fail Fast) ---
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=5000
spring.datasource.hikari.validation-timeout=3000


# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# --- JWT ---
floowroom.jwt.secret=${JWT_SECRET:f1o0w-r0om-s3cr3t-k3y-at-l3ast-32-ch4rs!}
floowroom.jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Swagger / SpringDoc ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- Static Resources ---
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# --- Log ---
logging.level.com.floowroom=INFO
logging.level.org.springframework.security=WARN
