# ============================================================
#  FloowRoom – application.properties (Render-ready)
#  Lê variáveis de ambiente; usa valores locais como fallback
# ============================================================

# --- Servidor ---
server.port=${PORT:8080}

# --- Banco de Dados (variáveis definidas no Render Dashboard ou fallback H2 em memória) ---
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:floowroom;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# --- Hikari Connection Pool (Fail Fast) ---
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=5000
spring.datasource.hikari.validation-timeout=3000


# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# --- JWT ---
floowroom.jwt.secret=${JWT_SECRET:f1o0w-r0om-s3cr3t-k3y-at-l3ast-32-ch4rs!}
floowroom.jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Swagger / SpringDoc ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- Static Resources ---
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# --- Log ---
logging.level.com.floowroom=INFO
logging.level.org.springframework.security=WARN
