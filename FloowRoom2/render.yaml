# ============================================================
#  render.yaml — Deploy automático no Render
#  Documentação: https://render.com/docs/render-yaml-reference
# ============================================================

services:
  - type: web
    name: floowroom-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free          # altere para "starter" em produção
    healthCheckPath: /api/auth/health
    envVars:
      - key: PORT
        value: 8080
      # Configure estas variáveis no Render Dashboard > Environment:
      - key: DATABASE_URL
        sync: false     # não sincronizar do repo por segurança
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true   # Render gera automaticamente
      - key: JWT_EXPIRATION
        value: 86400000
